name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - label: Windows
            platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ""
          - label: Linux
            platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'app-v__VERSION__' }}
          releaseName: Term Proxy v__VERSION__
          releaseBody: |
            Term Proxy desktop builds for macOS, Windows, and Linux.

            This release is created as a draft. Review the generated assets before publishing.
          releaseDraft: true
          prerelease: false
